<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff7eb3,#7c3aed);
  color:#fff;
  min-height:100vh;
}

header{text-align:center;padding:30px 15px}
header h1{font-size:42px;color:#fff176;margin-bottom:10px}
header p{font-weight:bold;color:#fff}

.container{max-width:900px;margin:auto;padding:15px}

.ad-area{
  background:#fff;
  padding:15px;
  border-radius:18px;
  margin-bottom:20px;
}

.quiz-box{
  background:#4a044e;
  border-radius:24px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.badge,.score{
  padding:10px 18px;
  border-radius:999px;
  font-weight:bold;
}

.badge{background:#fff176;color:#3b0764}
.score{background:#22c55e;color:#052e16}

.progress{
  width:100%;
  height:12px;
  background:#701a75;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:25px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#fff176,#f472b6);
  transition:.3s;
}

#question{
  font-size:28px;
  font-weight:bold;
  line-height:1.6;
  margin-bottom:25px;
}

.choices{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.choice-btn{
  border:none;
  background:#86198f;
  color:#fff;
  border:2px solid #f0abfc;
  padding:18px;
  border-radius:18px;
  cursor:pointer;
  font-size:17px;
  font-weight:bold;
  transition:.2s;
}

.choice-btn:hover{
  background:#a21caf;
  transform:translateY(-2px);
}

.correct{
  background:#22c55e!important;
  border-color:#22c55e!important;
  color:#052e16!important;
}

.wrong{
  background:#ef4444!important;
  border-color:#ef4444!important;
}

#result{
  margin-top:22px;
  font-size:22px;
  font-weight:bold;
  min-height:40px;
}

.final{
  text-align:center;
  padding:40px 10px;
}

.final h2{
  font-size:40px;
  margin-bottom:20px;
  color:#fff176;
}

.final p{
  font-size:24px;
  margin-bottom:20px;
}

.restart-btn{
  border:none;
  background:#fff176;
  color:#3b0764;
  padding:15px 30px;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:700px){
  .choices{grid-template-columns:1fr}
  #question{font-size:22px}
}
</style>
</head>

const countEl = document.getElementById("count");
const scoreEl = document.getElementById("score");
const progressBar = document.getElementById("progressBar");
const quizBox = document.getElementById("quizBox");

function shuffle(array){
  const arr = [...array];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

  scoreEl.innerHTML = "正解数 " + score;
  progressBar.style.width = ((current)/TOTAL)*100 + "%";

  choicesEl.innerHTML = "";

  shuffle(q.choices).forEach(choice=>{

    btn.className = "choice-btn";
    btn.innerHTML = choice;
    btn.onclick = () => checkAnswer(btn,choice,q.a);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn,selected,correct){
  const buttons = document.querySelectorAll(".choice-btn");

  buttons.forEach(b=>{
    b.disabled = true;
    if(b.innerHTML === correct){
      b.classList.add("correct");
    }
  });

  if(selected === correct){
    score++;
    btn.classList.add("correct");
    resultEl.innerHTML = "✅ 正解！";
    resultEl.style.color = "#22c55e";
  }else{
    btn.classList.add("wrong");
    resultEl.innerHTML = "❌ 不正解！ 正解は「" + correct + "」";
    resultEl.style.color = "#ef4444";
  }

  scoreEl.innerHTML = "正解数 " + score;
  progressBar.style.width = ((current+1)/TOTAL)*100 + "%";

  setTimeout(()=>{
    current++;
    if(current >= TOTAL){
      showFinal();
    }else{
      showQuestion();
    }
  },900);
}

function showFinal(){
  const percent = Math.round((score/TOTAL)*100);

  quizBox.innerHTML = `
    <div class="final">
      <h2>🎉 クイズ終了！</h2>
      <p>${score} / ${TOTAL} 問正解！</p>
      <p>正答率 ${percent}%</p>

  `;
}
